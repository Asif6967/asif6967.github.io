<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Asif Tech Global</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Professional Layout Styling */
    .contact-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      margin-top: 40px;
      justify-content: center;
    }
    .contact-info, .contact-form-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      flex: 1;
      min-width: 300px;
    }
    .contact-info h2 { color: #ffae42; }
    .social-btns { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
    .btn {
      padding: 12px;
      text-align: center;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-linkedin { background: #0077b5; color: white; }
    .btn-whatsapp { background: #25d366; color: white; }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: rgba(255,255,255,0.1);
      border: 1px solid #444;
      border-radius: 8px;
      color: white;
    }
    .submit-btn {
      background: #ffae42;
      color: black;
      border: none;
      padding: 15px;
      width: 100%;
      font-weight: bold;
      cursor: pointer;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div id="dynamic-bg"></div>
  <nav>
    <div class="logo">Asif Tech<span> Global</span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <div class="container">
    <div class="contact-wrapper">
      <div class="contact-info">
        <h2>Contact Us</h2>
        <p>Badi companies aur collaboration ke liye humse judiye.</p>
        <div class="social-btns">
          <a href="https://www.linkedin.com/in/mohd-asif-4ab4652a9/" target="_blank" class="btn btn-linkedin">LinkedIn Profile</a>
          <a href="https://whatsapp.com/channel/0029Vb73fjEFnSz6IcUhpU07" target="_blank" class="btn btn-whatsapp">WhatsApp Channel</a>
        </div>
      </div>

      <div class="contact-form-card">
        <form action="https://formspree.io/f/xojvrpog" method="POST" enctype="multipart/form-data">
          <input type="text" name="name" placeholder="Full Name" required>
          <input type="text" name="company" placeholder="Company Name (Optional)">
          <input type="email" name="email" placeholder="Work Email" required>
          <label style="font-size: 12px; color: #aaa;">Upload Project Details (PDF/Image):</label>
          <input type="file" name="upload">
          <textarea name="message" placeholder="How can we help?" required rows="4"></textarea>
          <button type="submit" class="submit-btn">Send Message</button>
        </form>
      </div>
    </div>
  </div>

  <footer style="text-align:center; padding: 40px; color: #666;">
    © 2026 Asif Tech Global | Professional Solutions
  </footer>
</body>
</html>
