<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Business News Hub | Asif Teach Global</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .choice-btn { padding: 15px 30px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; margin: 10px; }
        .hindi-btn { background: #22c55e; color: white; }
        .english-btn { background: #3b82f6; color: white; }
        .choice-btn:hover { transform: scale(1.1); box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .active-video { border: 3px solid #ff9900; border-radius: 15px; overflow: hidden; }
    </style>
</head>
<body style="background: #020617; color: white; margin: 0; font-family: sans-serif; text-align: center;">

    <div style="background: #ef4444; color: white; padding: 10px; font-weight: bold;">
        <marquee> 🚀 ताज़ा खबरें: अपनी भाषा चुनें | 💰 DEALS: <a href="https://www.amazon.in/b?node=98175016031&tag=realasifunive-21" style="color: yellow;">Shop Business Gadgets</a> </marquee>
    </div>

    <div style="padding: 40px 20px;">
        <h1 style="color: #3b82f6;">Choose Your News Feed</h1>
        <p style="color: #ccc;">Select your preferred language to watch 24/7 Live Business News</p>

        <div style="margin: 30px 0;">
            <button class="choice-btn hindi-btn" onclick="showNews('hindi')">📺 Zee Business (Hindi)</button>
            <button class="choice-btn english-btn" onclick="showNews('english')">📺 Bloomberg (English)</button>
        </div>

        <div style="max-width: 800px; margin: 0 auto;">
            <div id="video-box" class="active-video">
                <iframe id="news-frame" width="100%" height="450" 
                        src="https://www.youtube.com/embed/live_stream?channel=UC4pD8U6i9v0v40g7655n63A&autoplay=1&mute=1" 
                        frameborder="0" allowfullscreen>
                </iframe>
            </div>
            <h3 id="news-title" style="margin-top: 20px; color: #22c55e;">Watching: Zee Business Live (Hindi)</h3>
        </div>

        <div style="margin-top: 40px; background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; display: inline-block;">
            <h4 style="color: #ff9900; margin-top: 0;">🔥 Recommended for You</h4>
            <a href="https://www.amazon.in/b?node=98175016031&tag=realasifunive-21" style="color: white; text-decoration: none; background: #ff9900; padding: 10px 20px; border-radius: 10px; font-weight: bold;">View Laptop Deals</a>
        </div>
    </div>

    <script>
        function showNews(lang) {
            const frame = document.getElementById('news-frame');
            const title = document.getElementById('news-title');
            
            if(lang === 'hindi') {
                frame.src = "https://www.youtube.com/embed/live_stream?channel=UC4pD8U6i9v0v40g7655n63A&autoplay=1";
                title.innerText = "Watching: Zee Business Live (Hindi)";
                title.style.color = "#22c55e";
            } else {
                frame.src = "https://www.youtube.com/embed/live_stream?channel=UCIALMKvObZNtJ6AmdCLP7Lg&autoplay=1";
                title.innerText = "Watching: Bloomberg Live (English)";
                title.style.color = "#3b82f6";
            }
        }
    </script>

</body>
</html>
