<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <title>Business News Hub | Asif Teach Global</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .choice-container {
      margin: 25px 0;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .btn-news {
      padding: 12px 25px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      color: white;
      transition: 0.3s;
      font-size: 14px;
    }
    .btn-hindi { background: #f97316; }
    .btn-hindi-2 { background: #22c55e; }
    .btn-english { background: #3b82f6; }
    .btn-news:hover { filter: brightness(1.1); transform: translateY(-1px); }

    .video-wrapper {
      max-width: 850px;
      margin: 0 auto;
      border: 2px solid #333;
      border-radius: 15px;
      overflow: hidden;
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      background: #000;
    }
    .video-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }
  </style>
</head>
<body style="background: #020617; color: white; margin: 0; font-family: sans-serif; text-align: center;">

  <div style="background: #ef4444; color: white; padding: 10px; font-weight: bold;">
    <marquee>
      🔥 LIVE: अपनी भाषा चुनें | 💰 DEALS:
      <a href="https://www.amazon.in/b?node=98175016031&tag=realasifunive-21"
         style="color: yellow;">Shop Now</a>
    </marquee>
  </div>

  <div style="padding: 30px 10px;">
    <h1>Choose Your Live Business News</h1>

    <div class="choice-container">
      <button class="btn-news btn-hindi" onclick="changeStream('hindi1')">
        🇮🇳 Hindi 1 (Zee Business)
      </button>
      <button class="btn-news btn-hindi-2" onclick="changeStream('hindi2')">
        📈 Hindi 2 (CNBC Awaaz)
      </button>
      <button class="btn-news btn-english" onclick="changeStream('english')">
        🌎 English (Bloomberg)
      </button>
    </div>

    <div class="video-wrapper">
      <iframe id="mainPlayer"
              src="https://www.youtube.com/embed/live_stream?channel=UC4pD8U6i9v0v40g7655n63A&autoplay=1&mute=1"
              allow="autoplay; encrypted-media"
              allowfullscreen>
      </iframe>
    </div>

    <h3 id="currentLabel" style="margin-top: 15px; color: #f97316;">
      Watching: Hindi Business News (Zee Business)
    </h3>

    <div style="margin-top: 30px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; display: inline-block;">
      <a href="https://www.amazon.in/b?node=98175016031&tag=realasifunive-21"
         style="color: #ff9900; font-weight: bold; text-decoration: none;">
        🔥 Check Today's Business Deals
      </a>
      <br><br>
      <a href="ai-tools-mba-2026.html"
         style="color: #3b82f6; text-decoration: none;">
        Unlock Premium Strategy (₹10) →
      </a>
    </div>
  </div>

  <script>
    function changeStream(lang) {
      const player = document.getElementById('mainPlayer');
      const label  = document.getElementById('currentLabel');

      if (lang === 'hindi1') {
        // Zee Business Hindi [web:77][web:84]
        player.src = "https://www.youtube.com/embed/live_stream?channel=UC4pD8U6i9v0v40g7655n63A&autoplay=1";
        label.innerText = "Watching: Hindi Business News (Zee Business)";
        label.style.color = "#f97316";
      } else if (lang === 'hindi2') {
        // CNBC Awaaz Hindi business [web:85]
        player.src = "https://www.youtube.com/embed/live_stream?channel=UCJgGc8pQO1lv04VXrBxA_Hg&autoplay=1";
        label.innerText = "Watching: Hindi Business News (CNBC Awaaz)";
        label.style.color = "#22c55e";
      } else {
        // Bloomberg English
        player.src = "https://www.youtube.com/embed/live_stream?channel=UCIALMKvObZNtJ6AmdCLP7Lg&autoplay=1";
        label.innerText = "Watching: English News Live (Bloomberg)";
        label.style.color = "#3b82f6";
      }
    }
  </script>
</body>
</html>
