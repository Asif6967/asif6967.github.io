<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asif Tech | Global Archive</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; }
        /* Language Bar Style */
        #google_translate_element { padding: 10px; text-align: right; background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 40px; }
        .card { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 25px; border-radius: 15px; cursor: pointer; transition: 0.3s;
        }
        .card:hover { border-color: #ffae42; transform: translateY(-5px); }
        .card h3 { color: #ffae42; margin: 10px 0; }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
        .modal-content { background: #111; margin: 10% auto; padding: 30px; border: 1px solid #ffae42; width: 70%; border-radius: 15px; }
        .close { color: #ffae42; float: right; font-size: 28px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="google_translate_element"></div>

    <h1 style="text-align:center; margin-top:40px; color:#ffae42;">PROJECT CASE STUDIES</h1>

    <div class="grid" id="mainGrid"></div>

    <div id="pModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeM()">&times;</span>
            <div id="modalText"></div>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        const pList = [
            { id: 1, t: "AI Data Predictor", d: "<b>1. Goal:</b> Forecast stock for retail.<br><b>2. Tech:</b> Python AI.<br><b>3. Result:</b> 40% cost saving." },
            { id: 2, t: "Global Payment Hub", d: "<b>1. Goal:</b> Secure B2B payments.<br><b>2. Tech:</b> Blockchain & SSL.<br><b>3. Result:</b> Zero fraud reported." }
        ];

        for(let i=3; i<=20; i++) {
            pList.push({ id: i, t: "Enterprise Solution #"+i, d: "<b>Goal:</b> High-level corporate implementation.<br><b>Architecture:</b> Cloud-based Scalability.<br><b>Outcome:</b> Global Deployment Success." });
        }

        const grid = document.getElementById('mainGrid');
        pList.forEach(p => {
            grid.innerHTML += `<div class="card" onclick="openM(${p.id})"><h3>${p.t}</h3><p>Click for details...</p></div>`;
        });

        function openM(id) {
            const p = pList.find(x => x.id === id);
            document.getElementById('modalText').innerHTML = `<h2>${p.t}</h2><hr><p style="line-height:1.8">${p.d}</p>`;
            document.getElementById('pModal').style.display = "block";
        }
        function closeM() { document.getElementById('pModal').style.display = "none"; }
    </script>
</body>
</html>
