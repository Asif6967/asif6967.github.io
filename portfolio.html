<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Asif Tech Market</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 🌑 DARK THEME SETTINGS */
        body {
            background-color: #0d1117; /* GitHub Dark Mode Background */
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* 🧭 NAVBAR (Navigation) */
        nav {
            background: #161b22;
            padding: 15px 20px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 20px; font-weight: bold; color: #ffae42; }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
        }
        .nav-links a:hover { color: #ffae42; }

        /* 🛍️ MARKET GRID */
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; text-align: center; }
        
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        /* 📦 PRODUCT CARD DESIGN */
        .product-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .product-card:hover {
            transform: translateY(-5px);
            border-color: #ffae42; /* Hover par Orange Border */
            box-shadow: 0 5px 15px rgba(255, 174, 66, 0.2);
        }
        
        .product-img {
            width: 100%;
            height: 200px;
            object-fit: contain; /* Photo katega nahi */
            background: #fff;
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        .price-tag {
            font-size: 18px;
            color: #fff;
            font-weight: bold;
            margin: 10px 0;
        }

        /* BUTTON STYLE */
        .buy-btn {
            display: inline-block;
            background: #ffae42;
            color: #000;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
            width: 80%;
        }
        .buy-btn:hover { background: #e69900; }
    </style>
</head>
